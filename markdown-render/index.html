<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ink — Markdown Renderer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #1a1a1a;
            --paper: #faf8f5;
            --cream: #f5f2ed;
            --stone: #e8e4dd;
            --graphite: #6b6b6b;
            --rust: #c45c3e;
            --deep-rust: #9a3d25;
            --serif: 'Cormorant Garamond', Georgia, serif;
            --sans: 'Outfit', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        html, body {
            height: 100%;
            background: var(--paper);
            color: var(--ink);
            font-family: var(--sans);
        }

        body {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 1000;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid var(--stone);
            background: var(--cream);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            background: var(--ink);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--paper);
            font-family: var(--serif);
            font-weight: 700;
            font-size: 18px;
            font-style: italic;
        }

        .logo-text {
            font-family: var(--serif);
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--ink);
        }

        .logo-sub {
            font-family: var(--sans);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--graphite);
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: transparent;
            border: 1px solid var(--stone);
            border-radius: 4px;
            font-family: var(--sans);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: var(--graphite);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .action-btn:hover {
            background: var(--ink);
            border-color: var(--ink);
            color: var(--paper);
        }

        .action-btn.primary {
            background: var(--rust);
            border-color: var(--rust);
            color: white;
        }

        .action-btn.primary:hover {
            background: var(--deep-rust);
            border-color: var(--deep-rust);
        }

        .action-btn svg {
            width: 14px;
            height: 14px;
        }

        /* Main container */
        .main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 0;
        }

        /* Editor panel */
        .editor-panel {
            display: flex;
            flex-direction: column;
            background: var(--cream);
            border-right: 1px solid var(--stone);
            position: relative;
        }

        .panel-label {
            position: absolute;
            top: 24px;
            left: 24px;
            font-family: var(--sans);
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--graphite);
            opacity: 0.6;
            z-index: 10;
        }

        .panel-label::after {
            content: '';
            display: block;
            width: 24px;
            height: 1px;
            background: var(--rust);
            margin-top: 8px;
        }

        textarea {
            flex: 1;
            padding: 64px 32px 32px;
            border: none;
            background: transparent;
            font-family: var(--mono);
            font-size: 13px;
            line-height: 1.8;
            color: var(--ink);
            resize: none;
            outline: none;
        }

        textarea::placeholder {
            color: var(--graphite);
            opacity: 0.4;
        }

        /* Preview panel */
        .preview-panel {
            display: flex;
            flex-direction: column;
            background: var(--paper);
            position: relative;
            overflow: hidden;
        }

        .preview-panel .panel-label {
            right: 24px;
            left: auto;
            text-align: right;
        }

        .preview-panel .panel-label::after {
            margin-left: auto;
        }

        /* Corner decorations */
        .corner-decor {
            position: absolute;
            width: 48px;
            height: 48px;
            border: 1px solid var(--stone);
            opacity: 0.4;
        }

        .corner-decor.top-left {
            top: 16px;
            left: 16px;
            border-right: none;
            border-bottom: none;
        }

        .corner-decor.bottom-right {
            bottom: 16px;
            right: 16px;
            border-left: none;
            border-top: none;
        }

        #preview {
            flex: 1;
            overflow-y: auto;
            padding: 64px 48px 48px;
            line-height: 1.9;
        }

        /* Scrollbar */
        #preview::-webkit-scrollbar {
            width: 8px;
        }

        #preview::-webkit-scrollbar-track {
            background: var(--cream);
        }

        #preview::-webkit-scrollbar-thumb {
            background: var(--stone);
            border-radius: 4px;
        }

        #preview::-webkit-scrollbar-thumb:hover {
            background: var(--graphite);
        }

        /* Markdown preview styles */
        #preview h1 {
            font-family: var(--serif);
            font-size: 3em;
            font-weight: 700;
            color: var(--ink);
            margin: 0 0 0.5em;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        #preview h1::first-letter {
            font-size: 1.15em;
            color: var(--rust);
        }

        #preview h2 {
            font-family: var(--serif);
            font-size: 1.75em;
            font-weight: 600;
            color: var(--ink);
            margin: 2em 0 0.75em;
            padding-bottom: 0.5em;
            border-bottom: 1px solid var(--stone);
            letter-spacing: -0.01em;
        }

        #preview h3 {
            font-family: var(--sans);
            font-size: 1.1em;
            font-weight: 600;
            color: var(--ink);
            margin: 1.75em 0 0.75em;
            letter-spacing: 0.02em;
        }

        #preview h4, #preview h5, #preview h6 {
            font-family: var(--sans);
            font-size: 0.9em;
            font-weight: 600;
            color: var(--graphite);
            margin: 1.5em 0 0.5em;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #preview p {
            font-family: var(--serif);
            font-size: 1.15em;
            color: var(--ink);
            margin: 1em 0;
            text-align: justify;
            hyphens: auto;
        }

        #preview a {
            color: var(--rust);
            text-decoration: none;
            border-bottom: 1px solid currentColor;
            transition: all 0.2s;
        }

        #preview a:hover {
            color: var(--deep-rust);
            background: rgba(196, 92, 62, 0.08);
        }

        #preview code {
            font-family: var(--mono);
            font-size: 0.85em;
            background: var(--cream);
            padding: 3px 8px;
            border-radius: 3px;
            color: var(--deep-rust);
            border: 1px solid var(--stone);
        }

        #preview pre {
            background: var(--ink);
            color: var(--cream);
            padding: 24px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 1.5em 0;
            line-height: 1.6;
            position: relative;
        }

        #preview pre::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--rust) 0%, var(--deep-rust) 100%);
        }

        #preview pre code {
            background: none;
            color: inherit;
            padding: 0;
            border: none;
            font-size: 0.9em;
        }

        #preview blockquote {
            font-family: var(--serif);
            font-style: italic;
            font-size: 1.2em;
            color: var(--graphite);
            border-left: 3px solid var(--rust);
            padding: 0.5em 0 0.5em 24px;
            margin: 1.5em 0;
            position: relative;
        }

        #preview blockquote::before {
            content: '"';
            position: absolute;
            left: 24px;
            top: -10px;
            font-size: 4em;
            color: var(--stone);
            font-family: var(--serif);
            line-height: 1;
        }

        #preview blockquote p {
            position: relative;
            z-index: 1;
        }

        #preview ul, #preview ol {
            margin: 1em 0;
            padding-left: 1.5em;
        }

        #preview li {
            font-family: var(--serif);
            font-size: 1.1em;
            margin: 0.5em 0;
            color: var(--ink);
        }

        #preview li::marker {
            color: var(--rust);
        }

        #preview strong {
            font-weight: 700;
            color: var(--ink);
        }

        #preview em {
            font-style: italic;
            color: var(--graphite);
        }

        #preview img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 1.5em 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        #preview table {
            width: 100%;
            border-collapse: collapse;
            margin: 1.5em 0;
            font-family: var(--sans);
            font-size: 0.9em;
        }

        #preview table th {
            background: var(--cream);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--ink);
            color: var(--ink);
            letter-spacing: 0.02em;
        }

        #preview table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--stone);
            color: var(--ink);
        }

        #preview table tr:hover td {
            background: var(--cream);
        }

        #preview hr {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--stone), transparent);
            margin: 3em 0;
            position: relative;
        }

        #preview hr::before {
            content: '§';
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--paper);
            padding: 0 16px;
            font-family: var(--serif);
            font-size: 1.2em;
            color: var(--graphite);
        }

        .mermaid-diagram {
            margin: 1.5em 0;
            text-align: center;
            overflow-x: auto;
            padding: 24px;
            background: var(--cream);
            border-radius: 4px;
        }

        .mermaid-diagram svg {
            max-width: 100%;
            height: auto;
        }

        /* Empty state */
        #preview:empty::before {
            content: 'Your rendered markdown will appear here...';
            font-family: var(--serif);
            font-style: italic;
            color: var(--graphite);
            opacity: 0.4;
        }

        /* Panel expand buttons */
        .panel-expand {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            background: var(--paper);
            border: 1px solid var(--stone);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--graphite);
            transition: all 0.2s;
            z-index: 20;
        }

        .panel-expand:hover {
            background: var(--ink);
            border-color: var(--ink);
            color: var(--paper);
        }

        .panel-expand svg {
            width: 14px;
            height: 14px;
        }

        .editor-panel .panel-expand {
            background: var(--cream);
        }

        /* Fullscreen modes */
        body.editor-fullscreen .preview-panel,
        body.preview-fullscreen .editor-panel {
            display: none;
        }

        body.editor-fullscreen .editor-panel,
        body.preview-fullscreen .preview-panel {
            grid-column: 1 / -1;
        }

        body.editor-fullscreen .header,
        body.preview-fullscreen .header {
            display: none;
        }

        body.editor-fullscreen,
        body.preview-fullscreen {
            overflow: auto;
        }

        body.editor-fullscreen .main,
        body.preview-fullscreen .main {
            grid-template-columns: 1fr;
            height: 100vh;
        }

        body.editor-fullscreen .editor-panel {
            border-right: none;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .main {
                grid-template-columns: 1fr;
            }

            .editor-panel {
                border-right: none;
                border-bottom: 1px solid var(--stone);
                min-height: 40vh;
            }

            .preview-panel {
                min-height: 50vh;
            }

            .header {
                flex-direction: column;
                gap: 16px;
                align-items: flex-start;
            }

            .header-actions {
                flex-wrap: wrap;
            }
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #preview > * {
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-mark">I</div>
            <div>
                <div class="logo-text">Ink</div>
                <div class="logo-sub">Markdown Renderer</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="action-btn" onclick="pasteContent()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                Paste
            </button>
            <button class="action-btn" onclick="clearContent()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
                    <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
                Clear
            </button>
            <button class="action-btn" onclick="exportMD()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Export .md
            </button>
            <button class="action-btn" onclick="exportHTML()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="16 18 22 12 16 6"/>
                    <polyline points="8 6 2 12 8 18"/>
                </svg>
                Export HTML
            </button>
            <button class="action-btn primary" onclick="exportPDF()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                Export PDF
            </button>
        </div>
    </header>

    <main class="main">
        <div class="editor-panel">
            <span class="panel-label">Input</span>
            <button class="panel-expand" onclick="toggleFullscreen('editor')" title="Toggle fullscreen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
                </svg>
            </button>
            <textarea id="markdown" placeholder="Start typing your markdown here...

# Welcome to Ink

A beautiful markdown renderer with an editorial aesthetic.

## Features

- **Live preview** as you type
- Support for *italic*, **bold**, and `code`
- Mermaid diagrams
- Export to MD, HTML, or PDF

> 'The details are not the details. They make the design.'
> — Charles Eames"></textarea>
        </div>
        <div class="preview-panel">
            <span class="panel-label">Preview</span>
            <button class="panel-expand" onclick="toggleFullscreen('preview')" title="Toggle fullscreen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
                </svg>
            </button>
            <div class="corner-decor top-left"></div>
            <div class="corner-decor bottom-right"></div>
            <div id="preview"></div>
        </div>
    </main>

    <script>
        const textarea = document.getElementById('markdown');
        const preview = document.getElementById('preview');

        mermaid.initialize({ startOnLoad: false, theme: 'neutral' });

        let mermaidIdCounter = 0;

        async function renderMarkdown() {
            preview.innerHTML = marked.parse(textarea.value);
            const mermaidBlocks = preview.querySelectorAll('pre code.language-mermaid');
            for (const block of mermaidBlocks) {
                const code = block.textContent;
                const id = 'mermaid-' + (++mermaidIdCounter);
                try {
                    const { svg } = await mermaid.render(id, code);
                    const div = document.createElement('div');
                    div.className = 'mermaid-diagram';
                    div.innerHTML = svg;
                    block.parentElement.replaceWith(div);
                } catch (e) {
                    console.error('Mermaid render error:', e);
                }
            }
        }

        // Update preview every 30 seconds instead of on every keystroke
        setInterval(renderMarkdown, 30000);

        // Also render when textarea loses focus
        textarea.addEventListener('blur', renderMarkdown);

        // Fullscreen toggle
        function toggleFullscreen(panel) {
            const editorClass = 'editor-fullscreen';
            const previewClass = 'preview-fullscreen';

            if (panel === 'editor') {
                document.body.classList.remove(previewClass);
                document.body.classList.toggle(editorClass);
            } else {
                document.body.classList.remove(editorClass);
                document.body.classList.toggle(previewClass);
            }
        }

        // Exit fullscreen with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.body.classList.remove('editor-fullscreen', 'preview-fullscreen');
            }
        });

        // Auto-save functionality
        const STORAGE_KEY = 'ink-markdown-content';

        function saveToStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, textarea.value);
            } catch (e) {
                console.warn('Failed to save to localStorage:', e);
            }
        }

        function loadFromStorage() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved !== null) {
                    textarea.value = saved;
                    return true;
                }
            } catch (e) {
                console.warn('Failed to load from localStorage:', e);
            }
            return false;
        }

        // Load saved content on page open
        if (loadFromStorage()) {
            renderMarkdown();
        } else {
            renderMarkdown();
        }

        // Auto-save every 1 minute
        setInterval(saveToStorage, 60000);

        // Also save on page unload
        window.addEventListener('beforeunload', saveToStorage);

        function pasteContent() {
            if (!navigator.clipboard || !navigator.clipboard.readText) {
                textarea.focus();
                alert('Clipboard API unavailable. Please use Ctrl+V (or Cmd+V) to paste directly into the editor.');
                return;
            }
            navigator.clipboard.readText().then(function(text) {
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                textarea.value = textarea.value.slice(0, start) + text + textarea.value.slice(end);
                textarea.selectionStart = textarea.selectionEnd = start + text.length;
                renderMarkdown();
            }).catch(function() {
                textarea.focus();
                alert('Clipboard access was denied. Please use Ctrl+V (or Cmd+V) to paste directly into the editor.');
            });
        }

        function clearContent() {
            textarea.value = '';
            localStorage.removeItem(STORAGE_KEY);
            renderMarkdown();
        }

        const LIGHT_CSS = `
            body{font-family:'Cormorant Garamond',Georgia,serif;max-width:720px;margin:48px auto;padding:0 24px;color:#1a1a1a;line-height:1.9;background:#faf8f5;}
            h1{font-size:2.5em;font-weight:700;margin:0 0 0.5em;letter-spacing:-0.03em;}
            h2{font-size:1.6em;font-weight:600;margin:2em 0 0.75em;padding-bottom:0.5em;border-bottom:1px solid #e8e4dd;}
            h3{font-family:'Outfit',sans-serif;font-size:1.1em;font-weight:600;margin:1.75em 0 0.75em;letter-spacing:0.02em;}
            p{font-size:1.1em;margin:1em 0;text-align:justify;}
            a{color:#c45c3e;text-decoration:none;border-bottom:1px solid currentColor;}
            code{font-family:'JetBrains Mono',monospace;font-size:0.85em;background:#f5f2ed;padding:3px 8px;border-radius:3px;color:#9a3d25;border:1px solid #e8e4dd;}
            pre{background:#1a1a1a;color:#f5f2ed;padding:24px;border-radius:4px;overflow-x:auto;margin:1.5em 0;line-height:1.6;border-top:3px solid #c45c3e;}
            pre code{background:none;color:inherit;padding:0;border:none;}
            blockquote{font-style:italic;color:#6b6b6b;border-left:3px solid #c45c3e;padding-left:24px;margin:1.5em 0;}
            ul,ol{margin:1em 0;padding-left:1.5em;}
            li{margin:0.5em 0;}
            table{width:100%;border-collapse:collapse;margin:1.5em 0;font-family:'Outfit',sans-serif;font-size:0.9em;}
            th{background:#f5f2ed;padding:14px 16px;text-align:left;font-weight:600;border-bottom:2px solid #1a1a1a;}
            td{padding:14px 16px;border-bottom:1px solid #e8e4dd;}
            hr{border:none;height:1px;background:#e8e4dd;margin:3em 0;}
            img{max-width:100%;height:auto;border-radius:4px;margin:1.5em 0;}
            .mermaid-diagram{margin:1.5em 0;text-align:center;}
        `;

        function exportMD() {
            const blob = new Blob([textarea.value], {type: 'text/markdown'});
            triggerDownload(URL.createObjectURL(blob), 'document.md');
        }

        function exportHTML() {
            const html = '<!DOCTYPE html>\n<html lang="en">\n<head>\n' +
                '  <meta charset="UTF-8">\n' +
                '  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
                '  <title>Document</title>\n' +
                '  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400&family=Outfit:wght@400;600&display=swap" rel="stylesheet">\n' +
                '  <style>' + LIGHT_CSS + '</style>\n' +
                '</head>\n<body>\n' + preview.innerHTML + '\n</body>\n</html>';
            const blob = new Blob([html], {type: 'text/html'});
            triggerDownload(URL.createObjectURL(blob), 'document.html');
        }

        function exportPDF() {
            // Create visible container for html2canvas to capture
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'position:absolute;left:-9999px;top:0;width:800px;background:#faf8f5;';

            const clone = document.createElement('div');
            clone.style.cssText = 'padding:48px;background:#faf8f5;color:#1a1a1a;line-height:1.9;';

            const styleEl = document.createElement('style');
            styleEl.textContent = `
                * { font-family: Georgia, serif; }
                h1 { font-size: 2.5em; font-weight: 700; margin: 0 0 0.5em; }
                h2 { font-size: 1.6em; font-weight: 600; margin: 2em 0 0.75em; padding-bottom: 0.5em; border-bottom: 1px solid #e8e4dd; }
                h3 { font-size: 1.1em; font-weight: 600; margin: 1.75em 0 0.75em; }
                p { font-size: 1.1em; margin: 1em 0; }
                a { color: #c45c3e; text-decoration: none; }
                code { font-family: monospace; font-size: 0.85em; background: #f5f2ed; padding: 3px 8px; border-radius: 3px; color: #9a3d25; }
                pre { background: #1a1a1a; color: #f5f2ed; padding: 24px; border-radius: 4px; overflow-x: auto; margin: 1.5em 0; }
                pre code { background: none; color: inherit; padding: 0; }
                blockquote { font-style: italic; color: #6b6b6b; border-left: 3px solid #c45c3e; padding-left: 24px; margin: 1.5em 0; }
                ul, ol { margin: 1em 0; padding-left: 1.5em; }
                li { margin: 0.5em 0; }
                table { width: 100%; border-collapse: collapse; margin: 1.5em 0; }
                th { background: #f5f2ed; padding: 14px 16px; text-align: left; font-weight: 600; border-bottom: 2px solid #1a1a1a; }
                td { padding: 14px 16px; border-bottom: 1px solid #e8e4dd; }
                hr { border: none; height: 1px; background: #e8e4dd; margin: 3em 0; }
                img { max-width: 100%; height: auto; }
            `;
            clone.appendChild(styleEl);

            const content = document.createElement('div');
            content.innerHTML = preview.innerHTML;
            clone.appendChild(content);

            wrapper.appendChild(clone);
            document.body.appendChild(wrapper);

            // Wait a moment for styles to apply, then generate PDF
            setTimeout(function() {
                html2pdf().set({
                    margin: [10, 10, 10, 10],
                    filename: 'document.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true,
                        backgroundColor: '#faf8f5',
                        logging: false,
                        windowWidth: 800
                    },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
                }).from(clone).save().then(function() {
                    document.body.removeChild(wrapper);
                }).catch(function(err) {
                    console.error('PDF export error:', err);
                    document.body.removeChild(wrapper);
                    alert('PDF export failed. Try exporting as HTML instead.');
                });
            }, 100);
        }

        function triggerDownload(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
