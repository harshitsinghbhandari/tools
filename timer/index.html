<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Flux — Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface-elevated: #1f1f1f;
      --border: #2a2a2a;
      --text: #ffffff;
      --text-dim: #666666;
      --accent: #00ff88;
      --accent-dim: #00cc6a;
      --warning: #ff6b35;
      --radius: 16px;
      --radius-sm: 8px;
      --font-display: 'Unbounded', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 20px) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
      position: relative;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Gradient orb */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,255,136,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      position: relative;
      z-index: 10;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-icon {
      width: 32px;
      height: 32px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .brand-icon::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 8px var(--accent); }
      50% { box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent); }
    }

    .brand-text {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .icon-btns {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .icon-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .icon-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Presets */
    .presets {
      display: flex;
      gap: 8px;
      padding: 0 20px;
      position: relative;
      z-index: 10;
    }

    .preset {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 400;
      color: var(--text-dim);
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .preset::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.2s;
    }

    .preset.active {
      color: var(--text);
      border-color: var(--accent);
      background: var(--surface-elevated);
    }

    .preset.active::before {
      transform: scaleX(1);
    }

    .preset:hover:not(.active) {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .preset span {
      display: block;
      font-family: var(--font-display);
      font-size: 9px;
      font-weight: 300;
      color: var(--text-dim);
      margin-top: 4px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .preset.active span {
      color: var(--accent-dim);
    }

    /* Timer display */
    #pip-container {
      flex: 1;
      display: flex;
      position: relative;
      z-index: 5;
    }

    .timer-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .timer-ring {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timer-ring::before {
      content: '';
      position: absolute;
      width: 280px;
      height: 280px;
      border: 1px solid var(--border);
      border-radius: 50%;
    }

    .timer-ring::after {
      content: '';
      position: absolute;
      width: 320px;
      height: 320px;
      border: 1px dashed var(--border);
      border-radius: 50%;
      animation: rotate 60s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .timer {
      font-family: var(--font-mono);
      font-size: clamp(56px, 16vw, 96px);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
      text-align: center;
      outline: none;
      position: relative;
      z-index: 10;
      text-shadow: 0 0 60px rgba(255,255,255,0.1);
    }

    body:not(.focus-mode) .timer:not(.done) {
      cursor: text;
    }

    .timer.done {
      color: var(--warning);
      animation: flash 1s ease-in-out infinite;
    }

    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .progress-container {
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: var(--surface);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .progress-track::before {
      content: '';
      position: absolute;
      inset: 0;
      border: 1px solid var(--border);
      border-radius: 2px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-dim));
      border-radius: 2px;
      width: 100%;
      transform-origin: left;
      transition: transform 0.5s linear;
      box-shadow: 0 0 20px var(--accent);
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .label.active {
      color: var(--accent);
    }

    .label.done-label {
      color: var(--warning);
    }

    /* PiP overlay */
    #pip-overlay {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      gap: 20px;
    }

    #pip-overlay .btn {
      width: auto;
      height: auto;
      padding: 12px 24px;
    }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px 20px;
      padding-bottom: max(env(safe-area-inset-bottom, 16px), 24px);
      position: relative;
      z-index: 10;
    }

    .btn {
      width: 100%;
      height: 56px;
      border-radius: var(--radius);
      border: none;
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-start {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 4px 24px rgba(0,255,136,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .btn-start:hover {
      background: var(--accent-dim);
    }

    .btn-pause {
      background: var(--surface-elevated);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .btn-reset {
      background: transparent;
      color: var(--text-dim);
      height: 44px;
      font-size: 11px;
      border: 1px solid var(--border);
    }

    .btn-reset:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    .dot-run {
      background: var(--accent);
      animation: blink 1s step-start infinite;
      box-shadow: 0 0 12px var(--accent);
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Focus mode */
    body.focus-mode {
      background: #000;
    }

    body.focus-mode::before,
    body.focus-mode::after {
      display: none;
    }

    body.focus-mode .top-bar,
    body.focus-mode .presets,
    body.focus-mode .controls,
    body.focus-mode .progress-container {
      display: none;
    }

    body.focus-mode .timer-wrap {
      padding: 0;
      cursor: pointer;
    }

    body.focus-mode .timer-ring::before,
    body.focus-mode .timer-ring::after {
      display: none;
    }

    body.focus-mode .timer {
      font-size: clamp(80px, 25vw, 180px);
      color: #fff;
      text-shadow: 0 0 100px rgba(0,255,136,0.3);
    }

    /* Responsive */
    @media (max-width: 400px) {
      .presets {
        gap: 6px;
      }

      .preset {
        padding: 12px 4px;
        font-size: 11px;
      }

      .timer-ring::before {
        width: 220px;
        height: 220px;
      }

      .timer-ring::after {
        width: 260px;
        height: 260px;
      }
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <div class="brand">
      <div class="brand-icon"></div>
      <span class="brand-text">Flux</span>
    </div>
    <div class="icon-btns">
      <button class="icon-btn" id="popoutBtn" onclick="togglePiP()" aria-label="Pop out timer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
      </button>
      <button class="icon-btn" id="focusBtn" onclick="toggleFocus()" aria-label="Enter focus mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
        </svg>
      </button>
    </div>
  </div>

  <div class="presets" id="presets">
    <button class="preset active" data-seconds="300">
      05:00
      <span>5 min</span>
    </button>
    <button class="preset" data-seconds="1500">
      25:00
      <span>25 min</span>
    </button>
    <button class="preset" data-seconds="3600">
      1:00:00
      <span>1 hr</span>
    </button>
    <button class="preset" data-seconds="7200">
      2:00:00
      <span>2 hrs</span>
    </button>
    <button class="preset" data-seconds="9000">
      2:30:00
      <span>2.5 hrs</span>
    </button>
  </div>

  <div id="pip-container">
    <div class="timer-wrap" id="timerContainer">
      <div class="timer-ring">
        <div class="timer" id="display">05:00</div>
      </div>
      <div class="progress-container">
        <div class="progress-track">
          <div class="progress-fill" id="progress"></div>
        </div>
        <div class="progress-info">
          <span class="label" id="statusLabel">ready</span>
          <span class="label" id="percentLabel">100%</span>
        </div>
      </div>
    </div>
  </div>

  <div id="pip-overlay">
    Timer is in pop-out window
    <button class="btn btn-reset" onclick="togglePiP()">Return to Tab</button>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="toggleBtn" onclick="toggle()">
      <span class="dot"></span>
      <span id="toggleBtnLabel">Start</span>
    </button>
    <button class="btn btn-reset" onclick="reset()">Reset Timer</button>
  </div>

  <script>
    const PRESETS = [300, 1500, 3600, 7200, 9000];
    let totalSeconds = 300;
    let remaining = 300;
    let running = false;
    let interval = null;
    let doneFlag = false;
    let pipWindow = null;

    const display = document.getElementById('display');
    const progress = document.getElementById('progress');
    const statusLabel = document.getElementById('statusLabel');
    const percentLabel = document.getElementById('percentLabel');
    const toggleBtn = document.getElementById('toggleBtn');
    const toggleBtnLabel = document.getElementById('toggleBtnLabel');
    const presetBtns = document.querySelectorAll('.preset');
    const timerContainer = document.getElementById('timerContainer');
    const pipOverlay = document.getElementById('pip-overlay');
    const pipBtn = document.getElementById('popoutBtn');
    const alarmSound = document.getElementById('alarmSound');

    function fmt(s) {
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
      return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function updateDisplay() {
      display.textContent = fmt(remaining);
      const ratio = totalSeconds > 0 ? remaining / totalSeconds : 0;
      progress.style.transform = `scaleX(${ratio})`;
      percentLabel.textContent = `${Math.round(ratio * 100)}%`;
    }

    function setToggleState(state) {
      toggleBtn.className = 'btn';
      const dot = toggleBtn.querySelector('.dot');

      statusLabel.className = 'label';

      if (state === 'running') {
        toggleBtn.classList.add('btn-pause');
        dot.className = 'dot dot-run';
        toggleBtnLabel.textContent = 'Pause';
        statusLabel.textContent = 'running';
        statusLabel.classList.add('active');
      } else if (state === 'paused') {
        toggleBtn.classList.add('btn-start');
        dot.className = 'dot';
        toggleBtnLabel.textContent = 'Resume';
        statusLabel.textContent = 'paused';
      } else if (state === 'done') {
        toggleBtn.classList.add('btn-reset');
        dot.className = 'dot';
        toggleBtn.style.pointerEvents = 'none';
        toggleBtnLabel.textContent = 'Done';
        statusLabel.textContent = 'complete';
        statusLabel.classList.add('done-label');
      } else {
        toggleBtn.classList.add('btn-start');
        dot.className = 'dot';
        toggleBtnLabel.textContent = 'Start';
        toggleBtn.style.pointerEvents = '';
        statusLabel.textContent = 'ready';
      }
    }

    function toggle() {
      if (doneFlag) return;
      if (running) {
        clearInterval(interval);
        running = false;
        setToggleState('paused');
      } else {
        running = true;
        setToggleState('running');
        interval = setInterval(tick, 1000);
      }
    }

    function tick() {
      if (remaining <= 0) {
        finish();
        return;
      }
      remaining--;
      updateDisplay();
      if (remaining <= 0) finish();
    }

    function finish() {
      clearInterval(interval);
      running = false;
      doneFlag = true;
      remaining = 0;
      updateDisplay();
      display.classList.add('done');
      setToggleState('done');
      alarmSound.play().catch(console.error);
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }

    function reset() {
      clearInterval(interval);
      running = false;
      doneFlag = false;
      remaining = totalSeconds;
      display.classList.remove('done');
      toggleBtn.style.pointerEvents = '';
      updateDisplay();
      setToggleState('ready');
    }

    function selectPreset(idx) {
      if (running) {
        clearInterval(interval);
        running = false;
      }
      doneFlag = false;
      totalSeconds = PRESETS[idx];
      remaining = totalSeconds;
      display.classList.remove('done');
      toggleBtn.style.pointerEvents = '';
      presetBtns.forEach((b, i) => b.classList.toggle('active', i === idx));
      updateDisplay();
      setToggleState('ready');
    }

    function toggleFocus() {
      document.body.classList.toggle('focus-mode');
      const focusBtn = document.getElementById('focusBtn');

      if (document.body.classList.contains('focus-mode')) {
        focusBtn.classList.add('active');
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      } else {
        focusBtn.classList.remove('active');
        if (document.exitFullscreen && document.fullscreenElement) {
          document.exitFullscreen().catch(() => {});
        }
      }
    }

    async function togglePiP() {
      if (pipWindow) {
        pipWindow.close();
        return;
      }

      if (!('documentPictureInPicture' in window)) {
        alert('Document Picture-in-Picture is not supported in this browser. Try Chrome 116+');
        return;
      }

      try {
        pipWindow = await window.documentPictureInPicture.requestWindow({
          width: 320,
          height: 320,
        });

        [...document.styleSheets].forEach((styleSheet) => {
          try {
            const cssRules = [...styleSheet.cssRules].map((rule) => rule.cssText).join('');
            const style = document.createElement('style');
            style.textContent = cssRules;
            pipWindow.document.head.appendChild(style);
          } catch (e) {
            const link = document.createElement('link');
            if (styleSheet.href) {
              link.rel = 'stylesheet';
              link.type = styleSheet.type;
              link.media = styleSheet.media;
              link.href = styleSheet.href;
              pipWindow.document.head.appendChild(link);
            }
          }
        });

        const pipStyle = document.createElement('style');
        pipStyle.textContent = `
          body { padding: 0 !important; display: flex !important; align-items: center; justify-content: center; background: #000; }
          body::before, body::after { display: none; }
          .timer-wrap { width: 100%; height: 100%; padding: 20px; }
          .timer { font-size: clamp(40px, 20vw, 120px); }
          .timer-ring::before, .timer-ring::after { display: none; }
        `;
        pipWindow.document.head.appendChild(pipStyle);

        pipWindow.document.body.append(timerContainer);
        pipOverlay.style.display = 'flex';
        pipBtn.classList.add('active');

        pipWindow.addEventListener('pagehide', (event) => {
          pipWindow = null;
          document.getElementById('pip-container').append(timerContainer);
          pipOverlay.style.display = 'none';
          pipBtn.classList.remove('active');
        });

      } catch (err) {
        console.error('Failed to enter PiP:', err);
      }
    }

    timerContainer.addEventListener('click', (e) => {
      if (document.body.classList.contains('focus-mode')) {
        toggleFocus();
      }
    });

    display.addEventListener('click', (e) => {
      if (running || doneFlag || document.body.classList.contains('focus-mode')) return;
      e.stopPropagation();
      display.contentEditable = true;
      display.focus();
      const range = document.createRange();
      range.selectNodeContents(display);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });

    display.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        display.blur();
      }
    });

    display.addEventListener('blur', () => {
      display.contentEditable = false;
      const input = display.textContent.trim();
      const parts = input.split(':').map(Number);
      let seconds = 0;
      let valid = true;

      if (parts.some(isNaN)) {
        valid = false;
      } else if (parts.length === 1) {
        seconds = parts[0] * 60;
      } else if (parts.length === 2) {
        seconds = parts[0] * 60 + parts[1];
      } else if (parts.length === 3) {
        seconds = parts[0] * 3600 + parts[1] * 60 + parts[2];
      } else {
        valid = false;
      }

      if (valid && seconds > 0) {
        totalSeconds = seconds;
        remaining = totalSeconds;
        presetBtns.forEach(b => b.classList.remove('active'));
      }

      updateDisplay();
    });

    presetBtns.forEach((btn, i) => {
      btn.addEventListener('click', () => selectPreset(i));
    });

    updateDisplay();
    setToggleState('ready');
  </script>
</body>

</html>
