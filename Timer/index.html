<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@200;300&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <audio id="alarmSound" src="alarm.mp3" preload="auto"></audio>
</head>

<body>

  <button class="focus-btn" id="popoutBtn" onclick="togglePiP()" aria-label="Pop out timer" style="right: 60px;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="17 8 12 3 7 8" />
      <line x1="12" y1="3" x2="12" y2="15" />
    </svg>
  </button>

  <button class="focus-btn" id="focusBtn" onclick="toggleFocus()" aria-label="Enter focus mode">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7" />
    </svg>
  </button>

  <div class="presets" id="presets">
    <button class="preset active" data-seconds="300">
      05:00
      <span>5 min</span>
    </button>
    <button class="preset" data-seconds="1500">
      25:00
      <span>25 min</span>
    </button>
    <button class="preset" data-seconds="3600">
      1:00:00
      <span>1 hr</span>
    </button>
    <button class="preset" data-seconds="7200">
      2:00:00
      <span>2 hrs</span>
    </button>
    <button class="preset" data-seconds="9000">
      2:30:00
      <span>2.5 hrs</span>
    </button>
  </div>

  <div id="pip-container">
    <div class="timer-wrap" id="timerContainer">
      <div class="timer" id="display">05:00</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress"></div>
      </div>
      <div class="label" id="statusLabel">ready</div>
    </div>
  </div>

  <div id="pip-overlay"
    style="display:none; flex:1; flex-direction:column; align-items:center; justify-content:center; color:#4a4844; font-size:12px; letter-spacing:0.05em; text-transform:uppercase;">
    Timer is in pop-out window
    <button class="btn btn-reset" onclick="togglePiP()"
      style="width:auto; height:auto; margin-top:20px; padding:10px 20px;">Return to Tab</button>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="toggleBtn" onclick="toggle()">
      <span class="dot"></span>
      <span id="toggleBtnLabel">Start</span>
    </button>
    <button class="btn btn-reset" onclick="reset()">Reset</button>
  </div>

  <script src="script.js" defer></script>
</body>

</html>
